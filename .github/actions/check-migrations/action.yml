name: 'Check Django Migrations'
description: >-
  Ensures Django models.py stays in sync with the migration tree.
  Fails the build if `python manage.py makemigrations --check --dry-run` would
  generate new migrations. Prevents silent schema drift reaching production.
inputs:
  python-version:
    description: 'Python version'
    required: false
    default: '3.11'
  requirements-file:
    description: 'Path to requirements file to install'
    required: false
    default: 'requirements.txt'
  manage-py:
    description: 'Path to manage.py'
    required: false
    default: 'manage.py'
  django-settings-module:
    description: >-
      DJANGO_SETTINGS_MODULE for the check. Defaults to the project's
      manage.py default. Override for projects with split settings where
      the default (dev.py) imports dev-only deps like debug_toolbar —
      typically set to the `test` or `prod` settings variant instead.
    required: false
    default: ''
  # In-memory sqlite is enough for makemigrations --check — it reads models.py
  # and migrations/ from disk and never actually connects to a real DB.
  # Any existing DJANGO_* settings must tolerate sqlite though.
  extra-env:
    description: 'Extra env vars (KEY=value, newline separated)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-check-migrations-${{ inputs.python-version }}-${{ hashFiles(inputs.requirements-file) }}

    - name: Install dependencies
      shell: bash
      run: |
        pip install --upgrade pip
        pip install -r "${{ inputs.requirements-file }}"

    - name: Export extra env vars
      if: inputs.extra-env != ''
      shell: bash
      run: |
        while IFS= read -r line; do
          [ -z "$line" ] && continue
          echo "$line" >> $GITHUB_ENV
        done <<< "${{ inputs.extra-env }}"

    - name: makemigrations --check --dry-run
      shell: bash
      env:
        # Minimal Django env so settings module loads without a real DB.
        # --check only reads models + existing migrations from disk, no DB I/O.
        # DEBUG=False so projects that conditionally import dev-only packages
        # (debug_toolbar, django-extensions) in DEBUG mode don't crash here.
        DJANGO_SECRET_KEY: ci-migrations-check-secret
        DJANGO_DEBUG: 'False'
        DJANGO_ALLOWED_HOSTS: 'localhost,127.0.0.1,testserver'
        DATABASE_URL: 'sqlite:///tmp/migrations_check.sqlite3'
        REDIS_URL: 'redis://localhost:6379/0'
        DJANGO_SETTINGS_MODULE: ${{ inputs.django-settings-module }}
      run: |
        set +e
        echo "Checking that models.py is in sync with migrations/..."
        output=$(python "${{ inputs.manage-py }}" makemigrations --check --dry-run --verbosity=2 2>&1)
        rc=$?
        echo "$output"
        if [ $rc -eq 0 ]; then
          echo "OK — migrations are in sync with models."
          exit 0
        fi
        # Distinguish: ModuleNotFoundError / ImportError / settings issue vs. real drift
        if echo "$output" | grep -qiE "(ModuleNotFoundError|ImportError|ImproperlyConfigured|AppRegistryNotReady)"; then
          echo ""
          echo "::error::Django failed to boot for the migration check. This is a settings / dependency problem, not a migration drift."
          echo "::error::Likely fix: make sure the minimal env vars above satisfy settings.py, and that any modules imported at top-level of settings/ are in requirements. See traceback above."
          exit 1
        fi
        echo ""
        echo "::error::Migrations drift detected. Some app models have changes that are NOT captured in a migration file."
        echo "::error::Run 'python manage.py makemigrations' locally, commit the generated files, and push."
        echo "::error::See dry-run output above to know which apps drifted."
        exit 1
